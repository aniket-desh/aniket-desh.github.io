<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0' name='viewport' />
  <link rel="icon" href="/assets/penrose.png" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
  <title>work in progress — aniket deshpande</title>
  <style>
    * {
      box-sizing: border-box;
    }

    ::selection {
      background: #f9e6e6;
    }

    ::-moz-selection {
      background: #f9e6e6;
    }

    html {
      overflow-x: hidden;
      overflow-y: scroll;
    }

    body {
      margin: 0;
      padding: 0;
      background: #fff;
      font-family: "EB Garamond", Georgia, "Times New Roman", serif;
      font-size: 17.6px;
      font-weight: 400;
      line-height: 1.5;
    }

    a {
      color: darkred;
      text-decoration: underline;
    }

    a:hover {
      color: #8B0000;
    }

    .container {
      width: min(100% - 48px, 620px);
      margin: 0 auto;
      padding: 220px 0 88px;
    }

    @media screen and (max-width: 640px) {
      .container {
        width: min(100% - 32px, 620px);
        padding: 94px 0 64px;
      }
    }

    .bio {
      max-width: none;
    }

    .bio__header {
      margin-bottom: 20px;
      font-weight: 400;
      font-size: 25.3px;
    }

    .bio__header a {
      text-decoration: none;
      color: inherit;
    }

    .bio__header a:hover {
      text-decoration: none;
    }

    .bio__tabs {
      margin-bottom: 20px;
      font-style: italic;
    }

    .bio__tabs a {
      text-decoration: none;
      color: inherit;
    }

    .bio__tabs a:hover {
      color: darkred;
    }

    .content {
      width: 100%;
      max-width: none;
    }

    .page-title {
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 10px;
    }

    .back-link {
      margin-top: 20px;
      font-style: italic;
    }

    .back-link a {
      text-decoration: none;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
</style>
</head>

<body>
  <div class="container">
    <div class="bio__header">
      <a href="/">work in progress</a>
    </div>

    <div class="content">
      <p>
        this page is under construction.<br>
        detailed notes will be uploaded here soon.
      </p>

      <div class="back-link">
        <a href="/">← back to home</a>
      </div>
    </div>
  </div>
</body>
</html>
